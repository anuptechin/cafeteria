server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API proxy (SSE-friendly: HTTP/1.1, no buffering, keep connection open).
  location /api/ {
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
  }

  # Employee face images served by the API.
  location /faces/ {
    proxy_pass http://api:4000;
    proxy_set_header Host $host;
  }

  # SPA fallback (hash routing, but keep this for safety).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
