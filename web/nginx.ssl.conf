# TLS-terminating server config for prod (activated by docker-compose.prod.yml,
# which bind-mounts this over /etc/nginx/conf.d/default.conf). Local dev keeps the
# plain-HTTP nginx.conf — this file is only mounted when the prod override is on.

# Plain HTTP -> permanent redirect to HTTPS. Catches old http:// bookmarks and
# any integration still hitting port 80.
server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

# HTTPS — TLS terminated here, then proxied to the API exactly as on plain HTTP.
server {
  listen 443 ssl;
  http2 on;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Corporate-CA certificate, mounted read-only from the host (see
  # docker-compose.prod.yml). fullchain.crt MUST be the server cert followed by
  # the intermediate CA chain, or some clients won't trust it.
  ssl_certificate     /etc/nginx/certs/fullchain.crt;
  ssl_certificate_key /etc/nginx/certs/server.key;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1h;

  # HSTS: only enable once HTTPS is confirmed stable — once a browser sees this it
  # refuses plain HTTP to this host until max-age expires. Uncomment to opt in.
  # add_header Strict-Transport-Security "max-age=31536000" always;

  # API proxy (SSE-friendly: HTTP/1.1, no buffering, keep connection open).
  location /api/ {
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
  }

  # Employee face images served by the API.
  location /faces/ {
    proxy_pass http://api:4000;
    proxy_set_header Host $host;
  }

  # SPA fallback (hash routing, but keep this for safety).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
