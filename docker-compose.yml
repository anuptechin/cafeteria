# D'Decor Cafeteria Management — full stack in Docker.
#   db  : Postgres 18 (data persisted in a named volume)
#   api : Express + tsx (schema applied on first boot, super admin auto-seeded)
#   web : Vite build served by nginx, proxies /api + /faces to the API
#
# Quick start:  cp .env.example .env  (fill in secrets)  &&  docker compose up --build
#   Web   -> http://localhost:8080
#   API   -> http://localhost:4000
#   Login -> SUPER_ADMIN_USER / SUPER_ADMIN_PASSWORD  (from .env)
# All credentials live in .env (gitignored); the stack won't start without it.

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:?set PGUSER in .env}
      POSTGRES_PASSWORD: ${PGPASSWORD:?set PGPASSWORD in .env}
      POSTGRES_DB: ${PGDATABASE:?set PGDATABASE in .env}
    volumes:
      - pgdata:/var/lib/postgresql   # postgres:18+ stores data in a versioned subdir here
    # No host port published -> Postgres is reachable only on the internal Docker
    # network. Uncomment for local psql/SSMS access if you really need it.
    # ports:
    #   - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    # All values come from .env (gitignored). Critical secrets are required (:?)
    # so the stack refuses to start with insecure defaults.
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:?set COMPOSE_DATABASE_URL in .env}
      PORT: ${PORT:-4000}
      APP_TZ: ${APP_TZ:-Asia/Kolkata}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      SUPER_ADMIN_USER: ${SUPER_ADMIN_USER:?set SUPER_ADMIN_USER in .env}
      SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:-Admin}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:?set SUPER_ADMIN_PASSWORD in .env}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata:
